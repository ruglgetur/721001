    /* ─── BASE ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      font-family: 'Orbitron', monospace, sans-serif;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    canvas {
      display: block;
      position: absolute;
      left: 0;
      touch-action: none;
      background: radial-gradient(ellipse at 50% 40%, #080c18 0%, #000 100%);
    }

    /* ─── STATUSBAR ─────────────────────────────────────────────── */
    #statusbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 54px;
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 20;
      overflow: visible;

      /* fond : noir profond + scanlines subtiles années 50 */
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0,242,255,0.018) 3px,
          rgba(0,242,255,0.018) 4px
        ),
        linear-gradient(180deg, #060c18 0%, #02060e 100%);
    }

    /* Séparateur chromé multi-couche — reflet métallique */
    #statusbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        #001a2e 4%,
        #0088aa 15%,
        #00f2ff 35%,
        #c8faff 50%,
        #00f2ff 65%,
        #0088aa 85%,
        #001a2e 96%,
        transparent 100%
      );
      box-shadow: 0 0 8px 1px #00f2ff55, 0 0 20px 2px #00f2ff22;
    }

    /* Halo diffus sous la barre */
    #statusbar::before {
      content: '';
      position: absolute;
      bottom: -10px; left: 8%; right: 8%;
      height: 8px;
      background: radial-gradient(ellipse at center, #00f2ff22, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* ─── BLOCS SCORE / LEVEL ───────────────────────────────────── */
    .sb-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 72px;
    }
    .sb-block.right { align-items: flex-end; }

    .sb-label {
      font-size: 8px;
      letter-spacing: 3px;
      color: #3a7a8a;
      line-height: 1;
    }

    .sb-value {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      color: #00f2ff;
      line-height: 1;
      text-shadow: 0 0 12px #00f2ffaa, 0 0 28px #00f2ff44;
      transition: color 0.06s, text-shadow 0.06s;
    }

    /* Flash court sur chaque point */
    @keyframes hud-flash {
      0%   { color: #fff; text-shadow: 0 0 6px #fff, 0 0 20px #00f2ff, 0 0 40px #00f2ffaa; }
      100% { color: #00f2ff; text-shadow: 0 0 12px #00f2ffaa, 0 0 28px #00f2ff44; }
    }
    .sb-value.flash { animation: hud-flash 0.4s ease-out forwards; }

    /* ─── ATOME CENTRAL ─────────────────────────────────────────── */
    #sb-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      position: relative;
    }

    /* Atome pur CSS — 3 orbites elliptiques */
    .atom {
      width: 26px;
      height: 26px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .orbit {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,242,255,0.32);
      border-radius: 50%;
    }
    .orbit::before {
      content: '';
      position: absolute;
      width: 5px; height: 5px;
      background: #00f2ff;
      border-radius: 50%;
      top: -2.5px; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 6px #00f2ff, 0 0 12px #00f2ff88;
    }
    .orbit:nth-child(1) { transform: rotateX(75deg); animation: orb1 2.8s linear infinite; }
    .orbit:nth-child(2) { transform: rotateX(75deg) rotateZ(60deg);  animation: orb2 3.5s linear infinite reverse; }
    .orbit:nth-child(3) { transform: rotateX(75deg) rotateZ(120deg); animation: orb3 4.1s linear infinite; }

    @keyframes orb1 { to { transform: rotateX(75deg) rotate(360deg); } }
    @keyframes orb2 { to { transform: rotateX(75deg) rotateZ(60deg) rotate(-360deg); } }
    @keyframes orb3 { to { transform: rotateX(75deg) rotateZ(120deg) rotate(360deg); } }

    .nucleus {
      width: 6px; height: 6px;
      background: radial-gradient(circle, #fff 0%, #ff2fcf 60%);
      border-radius: 50%;
      box-shadow: 0 0 8px #ff2fcf, 0 0 16px #ff2fcf88;
      position: relative;
      z-index: 2;
    }

    #sb-name {
      font-size: 9px;
      letter-spacing: 3px;
      color: #ff2fcf;
      text-shadow: 0 0 8px #ff2fcf55;
      line-height: 1;
    }
    #sb-mode {
      font-size: 7px;
      letter-spacing: 2px;
      color: #2a3a4a;
      line-height: 1;
      height: 9px;
      transition: color 0.3s, text-shadow 0.3s;
    }
    #sb-mode.fire { color: #ff8833; text-shadow: 0 0 8px #ff883344; }

    /* ─── MODALS ────────────────────────────────────────────────── */
    #intro, #menu, #countdown, #endScreen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #00f2ff;
      z-index: 30;
    }
    /* #intro visible par défaut — s'affiche AVANT le JS sur Android/mobile */
    #intro { display: flex; }

    #introText {
      font-size: clamp(18px, 5vw, 30px);
      color: #00f2ff;
      text-shadow: 0 0 14px #00f2ff;
      animation: blink 1.2s steps(2, start) infinite;
      text-align: center;
      padding: 20px;
      letter-spacing: 2px;
    }
    #introSub {
      margin-top: 12px;
      font-size: 11px;
      color: #ff2fcf;
      opacity: 0.6;
      letter-spacing: 5px;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

    #menuTitle {
      font-size: clamp(36px, 10vw, 64px);
      color: #ff2fcf;
      text-shadow: 0 0 24px #ff2fcf;
      margin-bottom: 6px;
      letter-spacing: 4px;
    }
    #menuSub {
      font-size: 10px;
      color: #333;
      letter-spacing: 6px;
      margin-bottom: 32px;
    }

    #countNum {
      font-size: clamp(90px, 25vw, 160px);
      font-weight: bold;
      color: #ff2fcf;
      text-shadow: 0 0 40px #ff2fcf;
    }
    @keyframes pop { from{transform:scale(1.5);opacity:0.4;} to{transform:scale(1);opacity:1;} }
    .pop { animation: pop 0.5s ease-out forwards; }

    #endTitle {
      font-size: clamp(28px, 8vw, 52px);
      color: #ff2fcf;
      text-shadow: 0 0 24px #ff2fcf;
      margin-bottom: 14px;
      letter-spacing: 3px;
    }
    #endScore, #endBest {
      font-size: clamp(13px, 3.5vw, 19px);
      color: #fff;
      margin: 4px 0;
    }
    #endComment {
      font-size: clamp(11px, 3vw, 16px);
      color: #ff2fcf;
      font-style: italic;
      margin: 16px 20px 26px;
      text-align: center;
    }

    .btn {
      padding: 14px 32px;
      font-size: clamp(11px, 2.5vw, 14px);
      font-family: 'Orbitron', monospace, sans-serif;
      color: #fff;
      background: linear-gradient(145deg, #00f2ff, #ff2fcf);
      border: none;
      border-radius: 30px;
      box-shadow: 0 0 18px #00f2ff44;
      cursor: pointer;
      transition: transform 0.12s;
      margin: 8px 0;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .btn:active { transform: scale(0.93); }

    #soundBtn {
      font-size: 22px;
      background: none;
      border: none;
      margin-top: 12px;
      color: #00f2ff;
      cursor: pointer;
    }

    /* ─── TICKER ────────────────────────────────────────────────── */
    #ticker {
      position: absolute;
      bottom: 8px;
      width: 100%;
      text-align: center;
      font-size: clamp(9px, 2vw, 12px);
      color: #ff2fcf;
      font-style: italic;
      opacity: 0.6;
      z-index: 5;
      pointer-events: none;
      letter-spacing: 1px;
    }

    /* ─── DEBUG ─────────────────────────────────────────────────── */
    #debug {
      position: absolute;
      left: 12px; bottom: 40px;
      max-width: min(500px, 92vw);
      padding: 8px 12px;
      border: 1px solid rgba(255,47,207,0.35);
      background: rgba(0,0,0,0.75);
      color: #ff2fcf;
      font-size: 11px;
      line-height: 1.4;
      border-radius: 8px;
      display: none;
      z-index: 50;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <!-- ═══ BARRE DE STATUT ATOMIQUE ══════════════════════════════ -->
  <div id="statusbar">

    <div class="sb-block left">
      <span class="sb-label">SCORE</span>
      <span class="sb-value" id="sbScore">0</span>
    </div>

    <div id="sb-center">
      <div class="atom">
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="nucleus"></div>
      </div>
      <div id="sb-name">ST-PONK</div>
      <div id="sb-mode">CLASSIC</div>
    </div>

    <div class="sb-block right">
      <span class="sb-label">LEVEL</span>
      <span class="sb-value" id="sbLevel">1</span>
    </div>

  </div>

  <!-- ═══ CANVAS ════════════════════════════════════════════════ -->
  <canvas id="pong"></canvas>

  <!-- ═══ MODALS ═══════════════════════════════════════════════ -->
  <div id="intro">
    <div id="introText">↻ TAP TO START ST-PONK</div>
    <div id="introSub">NEON STADIUM · 2025</div>
  </div>

  <div id="menu">
    <div id="menuTitle">ST-PONK</div>
    <div id="menuSub">CHOOSE YOUR MODE</div>
    <button class="btn" id="classicBtn">CLASSIC MODE</button>
    <button class="btn" id="fireBtn">🔥 FIREBALL MODE</button>
    <button id="soundBtn" aria-label="Toggle sound">🔈</button>
  </div>

  <div id="countdown">
    <div id="countNum">3</div>
  </div>

  <div id="endScreen">
    <div id="endTitle">GAME OVER</div>
    <div id="endScore">Score : <span id="endScoreVal">0</span></div>
    <div id="endBest">Meilleur : <span id="endBestVal">0</span></div>
    <div id="endComment"></div>
    <button class="btn" id="backBtn">BACK TO MENU</button>
  </div>

  <div id="ticker">READY PLAYER ONE...</div>
  <div id="debug"></div>

  <script>
    "use strict";

    // ─── CONSTANTE ──────────────────────────────────────────────────
    const HUD_H = 54;

    // ─── DOM (refs cachées une seule fois) ──────────────────────────
    const canvas    = document.getElementById("pong");
    const ctx       = canvas.getContext("2d");
    const statusbar = document.getElementById("statusbar");
    const intro     = document.getElementById("intro");
    const menu      = document.getElementById("menu");
    const cntdwn    = document.getElementById("countdown");
    const endScr    = document.getElementById("endScreen");
    const debugBox  = document.getElementById("debug");
    const elScore   = document.getElementById("sbScore");
    const elLevel   = document.getElementById("sbLevel");
    const elMode    = document.getElementById("sb-mode");

    // ─── STORAGE ────────────────────────────────────────────────────
    const storage = (() => {
      try {
        const k = "__stponk__";
        localStorage.setItem(k,"1"); localStorage.removeItem(k);
        return localStorage;
      } catch(e) {
        return { getItem:()=>null, setItem:()=>{} };
      }
    })();

    // ─── ÉTAT ───────────────────────────────────────────────────────
    let playerX = 0, aiX = 0;
    let score = 0, playing = false, fireMode = false, paused = false;
    let soundOn = true, _pointMsg = 0;
    let highScore = parseInt(storage.getItem("ponkBest") || "0", 10) || 0;

    // Countdown dessiné sur canvas : 3→2→1→0(GO!)→-1(balle en jeu)
    let countVal   = -1;
    // true = balle collée au paddle joueur, attend le premier mouvement
    let ballAttached = false;

    const ball  = { x:0, y:0, radius:8, speedX:4, speedY:-4 };
    const PAD_W = 90, PAD_H = 14, PAD_OFF = 80;
    const trail = [], MAX_TRAIL = 20;

    // ─── AUDIO ──────────────────────────────────────────────────────
    let audioCtx = null;

    function ensureAudio() {
      if (!soundOn) return;
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
      } catch(e) { audioCtx = null; }
    }

    function beep(freq, dur, vol = 0.12) {
      if (!soundOn || !audioCtx) return;
      try {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = "square"; o.frequency.value = freq; g.gain.value = vol;
        o.connect(g).connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + dur / 1000);
      } catch(e) {}
    }

    // ─── HUD flash ──────────────────────────────────────────────────
    let _flashTimer = 0;

    function hudUpdate(s, lv) {
      elScore.textContent = s;
      elLevel.textContent = lv;
      elScore.classList.remove("flash");
      elLevel.classList.remove("flash");
      elScore.offsetWidth; // reflow minimal
      elScore.classList.add("flash");
      elLevel.classList.add("flash");
      clearTimeout(_flashTimer);
      _flashTimer = setTimeout(() => {
        elScore.classList.remove("flash");
        elLevel.classList.remove("flash");
      }, 420);
    }

    // ─── SCREENS ────────────────────────────────────────────────────
    function hideAll() {
      intro.style.display   = "none";
      menu.style.display    = "none";
      cntdwn.style.display  = "none"; // jamais affiché en v6 — countdown sur canvas
      endScr.style.display  = "none";
      statusbar.style.display = "none";
    }
    function showIntro() { hideAll(); intro.style.display  = "flex"; }
    function showMenu()  { hideAll(); menu.style.display   = "flex"; }

    function getComment(s) {
      if (s <= 2)  return "Pas glorieux, Capitaine...";
      if (s <= 5)  return "On dirait un robot sous caféine.";
      if (s <= 10) return "Stylé, rétro, précis.";
      if (s <= 20) return "Tu frôles la zone atomique.";
      return "Champion intergalactique rétro !";
    }

    function showEnd() {
      playing = false;
      document.getElementById("endScoreVal").textContent = score;
      if (score > highScore) {
        highScore = score;
        try { storage.setItem("ponkBest", String(highScore)); } catch(e) {}
      }
      document.getElementById("endBestVal").textContent = highScore;
      document.getElementById("endComment").textContent = getComment(score);
      hideAll();
      endScr.style.display = "flex";
      beep(100, 300, 0.25);
    }

    // ─── COUNTDOWN (canvas overlay) ─────────────────────────────────
    // Plus d'écran noir : le décompte se dessine directement sur le canvas,
    // les raquettes et la balle sont déjà visibles.
    function startCountdown() {
      launchGame(); // le countdown est géré dans launchGame()
    }

    // ─── SERVE ──────────────────────────────────────────────────────
    // Déclenché par le premier mouvement du joueur après le GO !
    function serveBall() {
      if (!ballAttached) return;
      ballAttached = false;
      countVal = -1;
      const spd = 4;
      ball.speedX = (Math.random() > 0.5 ? 1 : -1) * spd;
      ball.speedY = -spd;
    }

    // ─── LAUNCH ─────────────────────────────────────────────────────
    function launchGame() {
      resizeCanvas();
      playerX = canvas.width  / 2 - PAD_W / 2;
      aiX     = canvas.width  / 2 - PAD_W / 2;

      // Balle collée au paddle joueur — attend le premier mouvement
      ball.speedX  = 0; ball.speedY = 0;
      ballAttached = true;
      // (ball.x/y mis à jour chaque frame par updateGame tant que ballAttached)

      score = 0; trail.length = 0; paused = false; playing = true;
      countVal = 3; // démarre le décompte visuel

      elMode.textContent = fireMode ? "🔥 FIREBALL" : "CLASSIC";
      elMode.className   = fireMode ? "fire" : "";
      hudUpdate(0, 1);

      hideAll();
      statusbar.style.display = "flex";

      // Décompte 3-2-1 puis GO! — beeps et décrémentation de countVal
      beep(500, 120);
      const tick = setInterval(() => {
        countVal--;
        if (countVal > 0) {
          beep(600, 100);
        } else if (countVal === 0) {
          // GO ! — autorise le serve sur prochain mouvement
          beep(900, 180);
          clearInterval(tick);
          // countVal reste à 0 jusqu'au serve effectif
        }
      }, 900);
    }

    // ─── UTILS ──────────────────────────────────────────────────────
    function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

    // ─── UPDATE ─────────────────────────────────────────────────────
    function updateGame() {
      if (!playing || paused) return;

      // ── Balle attachée au pad : on la suit, on attend le serve ──────
      if (ballAttached) {
        ball.x = clamp(playerX + PAD_W / 2, ball.radius, canvas.width - ball.radius);
        ball.y = canvas.height - PAD_OFF - ball.radius - 2;
        // IA reste centrée pendant le décompte
        aiX = canvas.width / 2 - PAD_W / 2;
        return;
      }

      ball.x += ball.speedX;
      ball.y += ball.speedY;

      // Rebonds latéraux
      if (ball.x - ball.radius < 0) {
        ball.x = ball.radius; ball.speedX = Math.abs(ball.speedX);
      } else if (ball.x + ball.radius > canvas.width) {
        ball.x = canvas.width - ball.radius; ball.speedX = -Math.abs(ball.speedX);
      }

      // Mur du haut → joueur marque
      if (ball.y - ball.radius < 0) {
        score++;
        const lv = Math.min(Math.floor(score / 5) + 1, 20);
        hudUpdate(score, lv);
        beep(660,80); setTimeout(()=>beep(880,80),90); setTimeout(()=>beep(1100,180),180);
        paused = true; _pointMsg = score;
        // Balle sur le pad de Lia — le joueur voit d'où va partir le tir
        ball.x = aiX + PAD_W / 2;
        ball.y = PAD_H + ball.radius + 2;
        ball.speedX = ball.speedY = 0;
        setTimeout(() => {
          const spd = Math.min(4 + score * 0.12, 9);
          ball.speedX = (Math.random() > 0.5 ? 1 : -1) * spd;
          ball.speedY = spd; // vers le joueur
          _pointMsg = 0; paused = false;
        }, 1200);
      }

      // Raquette joueur
      const py = canvas.height - PAD_OFF;
      if (
        ball.speedY > 0 &&
        ball.y + ball.radius >= py && ball.y + ball.radius <= py + PAD_H + 8 &&
        ball.x > playerX && ball.x < playerX + PAD_W
      ) {
        ball.y = py - ball.radius;
        const hit = (ball.x - (playerX + PAD_W / 2)) / (PAD_W / 2);
        ball.speedX = clamp(ball.speedX + hit * 2.5, -9, 9);
        ball.speedY = -Math.abs(ball.speedY);
        score++;
        hudUpdate(score, Math.min(Math.floor(score / 5) + 1, 20));
        beep(550 + score * 4, 70);
        if (fireMode) { ball.speedX *= 1.05; ball.speedY *= 1.05; }
      }

      // Raquette IA
      if (
        ball.speedY < 0 &&
        ball.y - ball.radius <= PAD_H && ball.y - ball.radius >= -8 &&
        ball.x > aiX && ball.x < aiX + PAD_W
      ) {
        ball.y = PAD_H + ball.radius;
        ball.speedY = Math.abs(ball.speedY);
        beep(300, 70);
        if (fireMode) { ball.speedX *= 1.03; ball.speedY *= 1.03; }
      }

      // Perdu
      if (ball.y - ball.radius > canvas.height) { showEnd(); return; }

      // Cap vitesse
      const spd = Math.hypot(ball.speedX, ball.speedY);
      if (spd > 14) {
        ball.speedX = (ball.speedX / spd) * 14;
        ball.speedY = (ball.speedY / spd) * 14;
      }

      // IA progressive
      const diff = Math.min(0.07 + score * 0.004, 0.22);
      const err  = Math.sin(Date.now() / 900) * Math.max(0, 18 - score * 0.4);
      aiX += (ball.x + err - (aiX + PAD_W / 2)) * diff;
      aiX     = clamp(aiX, 0, canvas.width - PAD_W);
      playerX = clamp(playerX, 0, canvas.width - PAD_W);

      if (fireMode) {
        trail.push({ x: ball.x, y: ball.y });
        if (trail.length > MAX_TRAIL) trail.shift();
      } else { trail.length = 0; }
    }

    // ─── DRAW ───────────────────────────────────────────────────────
    function drawGradientRect(x, y, w, h) {
      const g = ctx.createLinearGradient(x, y, x + w, y + h);
      g.addColorStop(0, "#00f2ff"); g.addColorStop(1, "#ff2fcf");
      ctx.fillStyle = g;
      ctx.fillRect(x, y, w, h);
    }

    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Ligne centrale
      ctx.save();
      ctx.setLineDash([6, 14]);
      ctx.strokeStyle = "rgba(0,242,255,0.07)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, canvas.height / 2);
      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
      ctx.restore();

      // Trail fireball
      if (fireMode) {
        for (let i = 0; i < trail.length; i++) {
          const t = trail[i], ratio = (i + 1) / trail.length;
          ctx.globalAlpha = ratio * 0.35;
          ctx.fillStyle = `hsl(${(i * 20) % 360},100%,55%)`;
          ctx.beginPath();
          ctx.arc(t.x, t.y, ball.radius * ratio * 0.8, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // Raquettes
      drawGradientRect(playerX, canvas.height - PAD_OFF, PAD_W, PAD_H);
      drawGradientRect(aiX, 0, PAD_W, PAD_H);

      // Balle
      ctx.fillStyle = fireMode ? "#ff8800" : "#FFD700";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // Pause
      if (playing && paused && !_pointMsg) {
        ctx.save();
        ctx.fillStyle = "rgba(255,47,207,0.85)";
        ctx.font = "bold 18px Orbitron, monospace";
        ctx.textAlign = "center";
        ctx.fillText("PAUSE (SPACE)", canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }

      // Flash point
      if (_pointMsg) {
        ctx.save();
        ctx.fillStyle = "rgba(0,8,16,0.60)";
        ctx.fillRect(0, canvas.height / 2 - 90, canvas.width, 150);
        ctx.textAlign = "center";
        const big = Math.round(Math.min(canvas.width * 0.16, 90));
        ctx.fillStyle = "#00f2ff";
        ctx.font = `900 ${big}px Orbitron, monospace`;
        ctx.fillText("POINT !", canvas.width / 2, canvas.height / 2 + 10);
        const sm = Math.round(Math.min(canvas.width * 0.06, 32));
        ctx.fillStyle = "#FFD700";
        ctx.font = `bold ${sm}px Orbitron, monospace`;
        ctx.fillText("SCORE  " + _pointMsg, canvas.width / 2, canvas.height / 2 + 55);
        ctx.restore();
      }

      // ── Countdown canvas-side ────────────────────────────────────
      // countVal : 3→2→1 = chiffre magenta / 0 = "GO!" cyan + hint serve
      if (playing && countVal >= 0) {
        ctx.save();
        ctx.textAlign = "center";

        if (countVal > 0) {
          // Fond vignette centrale semi-transparent
          const vr = Math.min(canvas.width, canvas.height) * 0.28;
          const grd = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, vr
          );
          grd.addColorStop(0, "rgba(0,0,0,0.55)");
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Chiffre — taille proportionnelle, couleur magenta
          const sz = Math.round(Math.min(canvas.width * 0.28, 160));
          ctx.font = `900 ${sz}px Orbitron, monospace`;
          ctx.fillStyle = "#ff2fcf";
          ctx.shadowColor = "#ff2fcf";
          ctx.shadowBlur  = 40;
          ctx.fillText(String(countVal), canvas.width / 2, canvas.height / 2 + sz * 0.35);

        } else {
          // countVal === 0 → GO! + invitation à servir
          const sz = Math.round(Math.min(canvas.width * 0.18, 110));
          ctx.font = `900 ${sz}px Orbitron, monospace`;
          ctx.fillStyle = "#00f2ff";
          ctx.shadowColor = "#00f2ff";
          ctx.shadowBlur  = 50;
          ctx.fillText("GO!", canvas.width / 2, canvas.height / 2 - 10);

          // Hint "MOVE TO SERVE" — pulse via sin sur le temps
          const pulse = 0.55 + 0.45 * Math.abs(Math.sin(Date.now() / 350));
          ctx.globalAlpha = pulse;
          ctx.shadowBlur  = 12;
          ctx.shadowColor = "#FFD700";
          const hs = Math.round(Math.min(canvas.width * 0.038, 18));
          ctx.font = `bold ${hs}px Orbitron, monospace`;
          ctx.fillStyle = "#FFD700";
          ctx.fillText("▶  MOVE TO SERVE", canvas.width / 2, canvas.height / 2 + sz * 0.6);
          ctx.globalAlpha = 1;
        }

        ctx.restore();
      }
    }

    // ─── GAME LOOP ───────────────────────────────────────────────────
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      updateGame();
      drawGame();
    }

    // ─── INPUTS ─────────────────────────────────────────────────────
    function setPlayerX(cx) {
      playerX = cx - PAD_W / 2;
      // Premier mouvement après GO ! → on sert la balle
      if (ballAttached && countVal === 0) serveBall();
    }

    canvas.addEventListener("pointerdown", e => { if (!playing) return; ensureAudio(); setPlayerX(e.clientX); });
    canvas.addEventListener("pointermove", e => {
      if (!playing) return;
      if (e.buttons === 0 && e.pointerType === "mouse") return;
      setPlayerX(e.clientX);
    });
    document.addEventListener("mousemove", e => { if (playing) setPlayerX(e.clientX); });
    document.addEventListener("keydown",   e => { if (e.code === "Space" && playing) paused = !paused; });

    // ─── BOUTONS ────────────────────────────────────────────────────
    intro.addEventListener("pointerdown", () => { ensureAudio(); showMenu(); });
    intro.addEventListener("click",       () => { ensureAudio(); showMenu(); });

    document.getElementById("classicBtn").addEventListener("click", () => { ensureAudio(); fireMode = false; startCountdown(); });
    document.getElementById("fireBtn").addEventListener("click",    () => { ensureAudio(); fireMode = true;  startCountdown(); });
    document.getElementById("backBtn").addEventListener("click",    () => { ensureAudio(); showMenu(); });

    document.getElementById("soundBtn").addEventListener("click", () => {
      soundOn = !soundOn;
      document.getElementById("soundBtn").textContent = soundOn ? "🔈" : "🔇";
      if (soundOn) ensureAudio();
    });

    // ─── TICKER ─────────────────────────────────────────────────────
    const msgs = [
      "WELCOME TO NEON STADIUM.",
      "HIT HARD. STAY COOL. WIN RETRO.",
      "NO AI CAN BEAT A HUMAN... YET.",
      "DESIGNED BY ST, 2025",
      "FAST REFLEXES REQUIRED.",
      "ATOM-POWERED REACTIONS INCOMING."
    ];
    let mi = 0;
    setInterval(() => {
      document.getElementById("ticker").textContent = msgs[mi++ % msgs.length];
    }, 5500);

    // ─── RESIZE ─────────────────────────────────────────────────────
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight - HUD_H;
      canvas.style.top = HUD_H + "px";
      playerX = clamp(playerX, 0, canvas.width - PAD_W);
      aiX     = clamp(aiX,     0, canvas.width - PAD_W);
      ball.x  = clamp(ball.x,  ball.radius, canvas.width  - ball.radius);
    }

    window.addEventListener("resize", resizeCanvas);
    document.addEventListener("visibilitychange", () => { if (document.hidden && playing) paused = true; });

    // ─── DEBUG ──────────────────────────────────────────────────────
    window.addEventListener("error", ev => {
      try {
        debugBox.style.display = "block";
        debugBox.textContent = "Erreur JS :\n" + (ev.message||"?") + (ev.filename ? "\n"+ev.filename+":"+ev.lineno : "");
      } catch(e) {}
    });
    window.addEventListener("unhandledrejection", ev => {
      try { debugBox.style.display = "block"; debugBox.textContent = "Promise :\n" + String(ev.reason||ev); } catch(e) {}
    });

    // ─── INIT ───────────────────────────────────────────────────────
    let _started = false;
    function _start() {
      if (_started) return; _started = true;
      // Double-RAF : garantit que le viewport Android est stable avant init canvas
      requestAnimationFrame(() => requestAnimationFrame(() => {
        resizeCanvas();
        document.getElementById("endBestVal").textContent = highScore;
        // #intro est déjà visible via CSS — showIntro() le confirme proprement
        showIntro();
        gameLoop();
      }));
    }
    // Toujours passer par DOMContentLoaded ou load pour être sûr
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", _start);
    } else if (document.readyState === "interactive") {
      window.addEventListener("load", _start);
      setTimeout(_start, 300); // fallback si load ne fire pas
    } else {
      // readyState === "complete" — layout stable, on démarre au prochain frame
      _start();
    }
  </script>
</body>
</html>
